<style>
  :root{
    --paper:#F0F1EE; --card:#FBFBF9; --ink:#2B2E33; --muted:#6B6F76;
    --faint:#9A9EA3; --line:#E1E0DA;
    --p1:#7A8B6F; --p1-soft:#EAEEE5;
    --p2:#5E7A8C; --p2-soft:#E6ECEF;
    --p3:#A9697A; --p3-soft:#F1E7EA;
    --daily:#4A4E54;
    --num:"Space Grotesk", ui-monospace, sans-serif;
    --cjk:"PingFang TC","Microsoft JhengHei","Noto Sans TC","Hiragino Sans",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--cjk);line-height:1.65;letter-spacing:.01em;
    padding:0 18px calc(72px + env(safe-area-inset-bottom))}
  .wrap{max-width:680px;margin:0 auto}
  button{font-family:inherit}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--p2);outline-offset:2px;border-radius:6px}
  small{font-size:11.5px;color:var(--faint)}

  /* ---------- bar ---------- */
  .bar{position:sticky;top:0;z-index:40;margin:0 -18px;background:rgba(240,241,238,.86);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
  .bar-in{max-width:680px;margin:0 auto;padding:10px 18px;padding-top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:10px}
  .bar-title{font-family:var(--num);font-size:12.5px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .bar-actions{display:flex;gap:8px}
  .btn{font-size:13.5px;font-weight:600;border:1px solid var(--p2);background:var(--p2);color:#fff;padding:7px 14px;border-radius:10px;cursor:pointer;line-height:1}

/* ---------------- state ---------------- */
const KEY="topik2_plan_v1";
let plan, editing=false, tab="exec";
const openWeeks=new Set();
let seededOpen=false;

/* ---------------- persistence ---------------- */
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(plan)); }catch(e){} }
function guessYear(mo){ const n=parseInt(mo.num,10); return (n>=7)?2026:2027; }
function weekFromKit(kit){ return {tasks:(kit||[]).map(k=>({txt:k.txt, small:k.small||"", done:false}))}; }
function makeWeeks(n, kit){ const a=[]; for(let i=0;i<n;i++) a.push(weekFromKit(kit)); return a; }
function todayStr(){ const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0"); }

function load(){
  let raw=null;
  try{ raw=localStorage.getItem(KEY); }catch(e){}
  if(raw){ try{ plan=JSON.parse(raw); }catch(e){ plan=clone(DEFAULT); } }
  else { plan=clone(DEFAULT); }
  ensureShape();
  save();
}
function ensureDailyToday(){
  const t=todayStr(), n=(plan.daily.items||[]).length;
  if(!plan.dailyState || plan.dailyState.date!==t || !Array.isArray(plan.dailyState.done) || plan.dailyState.done.length!==n){
    plan.dailyState={date:t, done:new Array(n).fill(false)};
  }
}
function ensureShape(){
  plan.meta=plan.meta||clone(DEFAULT.meta);
  plan.metrics=plan.metrics||[];
  plan.phases=plan.phases||[];
  plan.daily=plan.daily||clone(DEFAULT.daily);
  plan.sample=plan.sample||clone(DEFAULT.sample);
  if(!("note" in plan)) plan.note=DEFAULT.note;

  plan.phases.forEach((ph,pi)=>{
    if(!Array.isArray(ph.kit)) ph.kit = DEFAULT.phases[pi] ? clone(DEFAULT.phases[pi].kit) : [];
    const kit=ph.kit;
    (ph.months||[]).forEach(mo=>{
      (mo.rows||[]).forEach(r=>{ if(typeof r.done!=="boolean") r.done=false; });
      if(mo.year==null) mo.year=guessYear(mo);
      if(!Array.isArray(mo.weeks)) mo.weeks=makeWeeks(4, kit);
      else mo.weeks.forEach(w=>{ w.tasks=w.tasks||[]; w.tasks.forEach(t=>{ if(typeof t.done!=="boolean") t.done=false; if(t.small==null) t.small=""; }); });
    });
  });

  // one-time: weekly tasks follow each phase's kit (weekly operating sheet)
  if(!plan.meta.kitApplied_v1){
    plan.phases.forEach(ph=>{ const kit=ph.kit||[]; (ph.months||[]).forEach(mo=>{ (mo.weeks||[]).forEach(w=>{ w.tasks=kit.map(k=>({txt:k.txt, small:k.small||"", done:false})); }); }); });
    plan.meta.kitApplied_v1=true;
  }
  // one-time: mark unavailable weeks as rest
  if(!plan.meta.restApplied_v1){
    const BLOCKED=[["2026-08-11","2026-08-19"],["2026-09-19","2026-09-26"],["2026-10-07","2026-10-13"],["2026-10-28","2026-11-02"],["2026-12-25","2027-01-03"]];
    const toDate=s=>{ const p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); };
    const ranges=BLOCKED.map(b=>[toDate(b[0]),toDate(b[1])]);
    plan.phases.forEach(ph=>(ph.months||[]).forEach(mo=>{
      const W=(mo.weeks||[]).length;
      (mo.weeks||[]).forEach((w,wi)=>{
        const meta=weekMeta(mo,wi,W); if(!meta.start) return;
        const ws=new Date(meta.y,meta.mn-1,meta.start).getTime(), we=new Date(meta.y,meta.mn-1,meta.end).getTime();
        const len=meta.end-meta.start+1; let ov=0;
        ranges.forEach(([rs,re])=>{ const s=Math.max(ws,rs.getTime()), e=Math.min(we,re.getTime()); if(e>=s) ov=Math.max(ov,Math.round((e-s)/86400000)+1); });
        if(len>0 && ov/len>=0.5) w.rest=true;
      });
    }));
    plan.meta.restApplied_v1=true;
  }

  // one-time: text updates applied to existing saved data
  if(!plan.meta.textUpdate_v2){
    if(plan.meta.title==="9 個月讀書計畫") plan.meta.title="TOPIK讀書計劃";
    plan.meta.lede="目標：總分 150+／300";
    if(plan.sample){ plan.sample.title="一週節奏（以銜接期為例）"; plan.sample.note="每天都先跑「例行三件」,再疊上當天的每週目標項目。"; }
    const strip=s=>{
      if(typeof s!=="string") return s;
      let out=s.replace(/[、,，]?最該找人批改/g,"").replace(/[,，]?\s*\*{0,2}找人批改\*{0,2}（[^）]*）/g,"").replace(/[,，]?\s*找人批改/g,"");
      if(out!==s) out=out.replace(/[,，]\s*$/,"").trim();
      return out;
    };
    plan.phases.forEach(ph=>{
      ph.goal=strip(ph.goal);
      (ph.kit||[]).forEach(k=>{ const had=k.small&&k.small.indexOf("找人批改")>=0; k.txt=strip(k.txt); k.small=strip(k.small); if(had&&!k.small) k.txt=k.txt.replace(/[,，]\s*$/,""); });
      (ph.months||[]).forEach(mo=>{
        (mo.rows||[]).forEach(r=>{ r.txt=strip(r.txt); });
        (mo.weeks||[]).forEach(w=>{ (w.tasks||[]).forEach(t=>{ const had=t.small&&t.small.indexOf("找人批改")>=0; t.txt=strip(t.txt); t.small=strip(t.small); if(had&&!t.small) t.txt=t.txt.replace(/[,，]\s*$/,""); }); });
      });
    });
    (plan.daily.items||[]).forEach(it=>{ if(it.small && /App/i.test(it.small)) it.small="紙本單字書:遮起來回想再對答案,別只看過"; });
    plan.meta.textUpdate_v2=true;
  }
  ensureDailyToday();
}

/* ---------------- helpers ---------------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmt(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>"); }
function smallHTML(s){ return s?` <small>${esc(s)}</small>`:""; }

function daysUntil(d){
  if(!d) return null;
  const p=d.split("-").map(Number);
  const exam=new Date(p[0], p[1]-1, p[2]);
  const now=new Date(); const today=new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((exam-today)/86400000);
}
function dateLabel(d){
  if(!d) return "";
  const p=d.split("-").map(Number);
  const dt=new Date(p[0], p[1]-1, p[2]);
  const wd="日一二三四五六"[dt.getDay()];
  return `${p[0]} / ${String(p[1]).padStart(2,"0")} / ${String(p[2]).padStart(2,"0")}（${wd}）`;
}
function countdown(){
  const dU=daysUntil(plan.meta.examDate);
  if(dU===null) return {num:"—", small:""};
  if(dU>0) return {num:"D-"+dU, small:"還有 "+dU+" 天"};
  if(dU===0) return {num:"D-DAY", small:"就是今天"};
  return {num:"考完囉", small:"+"+(-dU)+" 天"};
}
function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
function weekMeta(mo, wi, W){
  const y=mo.year, mn=parseInt(mo.num,10);
  if(!y||!mn) return {label:`第${wi+1}週`, dates:"", current:false};
  const last=daysInMonth(y,mn);
  let start=wi*7+1;
  if(start>last) return {label:`第${wi+1}週`, dates:"", current:false};
  const end=(wi===W-1)?last:Math.min(start+6,last);
  const now=new Date();
  const current=(now.getFullYear()===y && (now.getMonth()+1)===mn && now.getDate()>=start && now.getDate()<=end);
  return {label:`第${wi+1}週`, dates:`${mn}/${start}–${mn}/${end}`, current, y, mn, start, end};
}
function findCurrentWeek(){
  for(let pi=0; pi<plan.phases.length; pi++){
    const ms=plan.phases[pi].months||[];
    for(let mi=0; mi<ms.length; mi++){
      const ws=ms[mi].weeks||[];
      for(let wi=0; wi<ws.length; wi++){
        if(weekMeta(ms[mi],wi,ws.length).current) return {pi,mi,wi,meta:weekMeta(ms[mi],wi,ws.length),mo:ms[mi]};
      }
    }
  }
  return null;
}
function phaseByToday(){
  const now=new Date(), y=now.getFullYear(), mn=now.getMonth()+1;
  for(let pi=0;pi<plan.phases.length;pi++){ for(const mo of (plan.phases[pi].months||[])){ if(mo.year===y && parseInt(mo.num,10)===mn) return pi; } }
  return 0;
}
function computeStats(){
  let od=0, ot=0, restCount=0; const phases=[], months={}, weeks={};
  plan.phases.forEach((ph,pi)=>{
    let pd=0, pt=0;
    (ph.months||[]).forEach((mo,mi)=>{
      let md=0, mt=0;
      (mo.rows||[]).forEach(r=>{ mt++; if(r.done) md++; });
      (mo.weeks||[]).forEach((w,wi)=>{
        if(w.rest){ weeks[pi+"_"+mi+"_"+wi]={done:0,total:0,rest:true}; restCount++; return; }
        let wd=0, wt=0;
        (w.tasks||[]).forEach(t=>{ wt++; if(t.done) wd++; });
        weeks[pi+"_"+mi+"_"+wi]={done:wd,total:wt};
        md+=wd; mt+=wt;
      });
      months[pi+"_"+mi]={done:md,total:mt};
      pd+=md; pt+=mt;
    });
    phases.push({done:pd,total:pt,pct:pt?Math.round(pd/pt*100):0});
    od+=pd; ot+=pt;
  });
  return {overall:{done:od,total:ot,pct:ot?Math.round(od/ot*100):0}, phases, months, weeks, restCount};
}

  return `<div class="row wrow${done}">${ck}<span class="txt">${fmt(t.txt)}${smallHTML(t.small)}</span>${ctls}</div>`;

function render(){
  ensureDailyToday();
  const st=computeStats();

  let h=`<div class="tabs">

    <button class="tab ${tab==="plan"?"on":""}" data-act="tab" data-tab="plan">總覽</button>
  </div>`;

  app.innerHTML=h;

function thisWeekCard(st,cur,withJump){

    return `<div class="thisweek rest"><div><div class="tw-k">本週</div>

  }
  const curWk=plan.phases[cur.pi].months[cur.mi].weeks[cur.wi];
  if(curWk.rest){
    return `<div class="thisweek rest"><div><div class="tw-k">本週</div>
      <div class="tw-title" style="font-family:var(--cjk);font-size:14px">休息週 · 無法讀書</div>
      <div class="tw-sub">${esc(cur.mo.num)}月 ${esc(cur.meta.label)}（${esc(cur.meta.dates)}）已扣除,回來再銜接</div></div></div>`;
  }
  const wc=st.weeks[cur.pi+"_"+cur.mi+"_"+cur.wi];
  const jump=withJump?`<button class="tw-btn" data-act="gotoweek" data-p="${cur.pi}" data-m="${cur.mi}" data-w="${cur.wi}">跳到本週</button>`:"";
  return `<div class="thisweek"><div><div class="tw-k">本週</div>
    <div class="tw-title">${esc(cur.mo.num)}月 ${esc(cur.meta.label)}　<span style="color:var(--faint);font-weight:500">${esc(cur.meta.dates)}</span></div>
    <div class="tw-sub">本週目標已完成 ${wc.done} / ${wc.total}</div></div>${jump}</div>`;
}

function execView(st,cur){
  const cd=countdown();
  const pi = cur ? cur.pi : phaseByToday();
  const ph = plan.phases[pi] || plan.phases[0];
  const badgeCls = ph.color==="p1"?"b1":ph.color==="p2"?"b2":"b3";
  const dstate = plan.dailyState.done;
  const dDone = dstate.filter(Boolean).length, dTot = plan.daily.items.length;
  let h="";

  h+=`<div class="exec-cd"><b>${esc(cd.num)}</b><span>距 ${esc(plan.meta.examLabel)} · 現在是「${esc(ph.title)}」</span></div>`;

  /* daily */
  h+=`<div class="daily">
    <div class="daily-head"><span class="badge">每日 · DAILY</span><span class="daily-cnt">今天 ${dDone}/${dTot}</span></div>
    <h2>${esc(plan.daily.title)}</h2>
    <div class="daily-sub">${esc(plan.daily.sub)}</div>`;
  plan.daily.items.forEach((it,i)=>{
    const done=dstate[i]?" done":"";
    const ck=`<button class="dck" data-act="dtoggle" data-i="${i}" aria-pressed="${dstate[i]?"true":"false"}" aria-label="標記完成"></button>`;
    const ctls=`<span class="ctls"><button class="ctl" data-act="editdaily" data-i="${i}">✎</button><button class="ctl del" data-act="deldaily" data-i="${i}">✕</button></span>`;
    h+=`<div class="drow${done}">${ck}<span class="dtxt">${fmt(it.txt)}${smallHTML(it.small)}</span>${ctls}</div>`;
  });
  h+=`<button class="daddrow" data-act="adddaily">＋ 每日項目</button>`;
  h+=`<div class="daily-hint">每天自動重置;今天的勾選會保存,跨日就清空。</div></div>`;

  /* this week's kit */
  h+=`<div class="sect">
    <div class="sect-head"><h2>本週目標</h2><span class="badge ${badgeCls}">${esc(ph.title)}</span></div>`;
  if(cur && !plan.phases[cur.pi].months[cur.mi].weeks[cur.wi].rest){
    const wk=plan.phases[cur.pi].months[cur.mi].weeks[cur.wi];
    const wc=st.weeks[cur.pi+"_"+cur.mi+"_"+cur.wi];
    h+=`<div class="sub">${esc(cur.mo.num)}月 ${esc(cur.meta.label)} · ${esc(cur.meta.dates)} —— 本週要湊齊 <b style="color:var(--ink)">${wc.done}/${wc.total}</b></div>`;
    (wk.tasks||[]).forEach((t,ti)=>{ h+=taskRowHTML(t,cur.pi,cur.mi,cur.wi,ti,esc(ph.color)); });
    h+=`<button class="addrow" data-act="waddrow" data-p="${cur.pi}" data-m="${cur.mi}" data-w="${cur.wi}">＋ 任務</button>`;
  } else if(cur){
    h+=`<div class="sub">本週是休息週,無法讀書。以下是「${esc(ph.title)}」每週目標參考:</div>`;
    (ph.kit||[]).forEach(k=>{ h+=`<div class="row"><span class="txt">${fmt(k.txt)}${smallHTML(k.small)}</span></div>`; });
  } else {
    h+=`<div class="sub">今天不在計畫週次;以下是「${esc(ph.title)}」每週目標參考:</div>`;
    (ph.kit||[]).forEach(k=>{ h+=`<div class="row"><span class="txt">${fmt(k.txt)}${smallHTML(k.small)}</span></div>`; });
    h+=`<div class="refnote">到了計畫期間,這裡會變成當週可打勾的清單。</div>`;
  }
  h+=`</div>`;

  /* sample week */
  h+=`<div class="sect">
    <div class="sect-head"><h2>${esc(plan.sample.title)}</h2></div>
    <div class="sub">${esc(plan.sample.note)}</div>`;
  (plan.sample.days||[]).forEach((d,i)=>{
    const ctls=editing?`<span class="ctls"><button class="ctl" data-act="editsample" data-i="${i}">✎</button><button class="ctl del" data-act="delsample" data-i="${i}">✕</button></span>`:"";
    h+=`<div class="sday"><span class="d${d.wknd?" wknd":""}">${esc(d.d)}</span><span class="x">${fmt(d.x)}${smallHTML(d.small)}</span>${ctls}</div>`;
  });
  h+=`<button class="addrow" data-act="addsample" style="margin-top:8px">＋ 新增一天</button>`;
  h+=`</div>`;

  h+=`<div class="foot">MIKA · KOREAN · WEEKLY OPERATING SHEET</div>`;
  return h;
}

/* ---------------- live counters (plan tab only) ---------------- */
function updateCounters(){
  const st=computeStats();
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  const fw=(id,pct)=>{ const el=document.getElementById(id); if(el) el.style.width=pct+"%"; };
  fw("ovFill",st.overall.pct); set("ovPct",st.overall.pct+"%");
  const ov=document.getElementById("ovSub"); if(ov) ov.textContent=`已完成 ${st.overall.done} / ${st.overall.total} 個任務${st.restCount?`　·　已扣除 ${st.restCount} 個休息週`:""}`;
  st.phases.forEach((ps,pi)=>{ fw("pf"+pi,ps.pct); set("pn"+pi,`${ps.done}/${ps.total}`); });
  Object.keys(st.months).forEach(k=>{ set("md"+k,`${st.months[k].done}/${st.months[k].total}`); });
  Object.keys(st.weeks).forEach(k=>{ set("wc"+k,`${st.weeks[k].done}/${st.weeks[k].total}`); });
}

/* ---------------- sheet ---------------- */
function openSheet(cfg){
  const bd=document.createElement("div");
  bd.className="backdrop";
  let inner=`<div class="sheet"><h3>${esc(cfg.title)}</h3>`;
  cfg.fields.forEach(f=>{
    const hint=f.hint?` <span class="hint">${esc(f.hint)}</span>`:"";
    let ctrl;
    if(f.type==="textarea") ctrl=`<textarea data-k="${f.key}" placeholder="${esc(f.placeholder||"")}">${esc(f.value||"")}</textarea>`;
    else if(f.type==="select") ctrl=`<select data-k="${f.key}">`+f.options.map(o=>`<option value="${esc(o.value)}"${o.value===f.value?" selected":""}>${esc(o.label)}</option>`).join("")+`</select>`;
    else ctrl=`<input type="${f.type||"text"}" data-k="${f.key}" value="${esc(f.value||"")}" placeholder="${esc(f.placeholder||"")}">`;
    inner+=`<div class="fld"><label>${esc(f.label)}${hint}</label>${ctrl}</div>`;
  });
  inner+=`<div class="sheet-actions">`;
  if(cfg.onDelete) inner+=`<button class="btn danger" data-s="del">刪除</button>`;
  inner+=`<button class="btn sec" data-s="cancel">取消</button><button class="btn" data-s="save">${esc(cfg.saveLabel||"儲存")}</button></div></div>`;
  bd.innerHTML=inner;
  document.body.appendChild(bd);
  const sheet=bd.querySelector(".sheet");
  const first=sheet.querySelector("input,textarea,select"); if(first) setTimeout(()=>first.focus(),50);
  const values=()=>{ const v={}; sheet.querySelectorAll("[data-k]").forEach(el=>v[el.getAttribute("data-k")]=el.value); return v; };
  bd.addEventListener("click", e=>{
    if(e.target===bd){ bd.remove(); return; }
    const b=e.target.closest("[data-s]"); if(!b) return;
    const s=b.getAttribute("data-s");
    if(s==="cancel") bd.remove();
    else if(s==="save"){ cfg.onSave(values()); bd.remove(); render(); }
    else if(s==="del"){ if(confirm("確定刪除？")){ cfg.onDelete(); bd.remove(); render(); } }
  });
}

function exportJSON(){

  a.href=url; a.download="topik2-plan-進度.json"; document.body.appendChild(a); a.click(); a.remove();

document.getElementById("importer").addEventListener("change",e=>{

  reader.readAsText(file);
});

/* ---------------- events ---------------- */
document.addEventListener("click", e=>{
  const t=e.target.closest("[data-act]"); if(!t) return;
  const act=t.getAttribute("data-act");
  const p=t.dataset.p!=null?+t.dataset.p:null, m=t.dataset.m!=null?+t.dataset.m:null;
  const r=t.dataset.r!=null?+t.dataset.r:null, w=t.dataset.w!=null?+t.dataset.w:null;
  const tk=t.dataset.t!=null?+t.dataset.t:null, i=t.dataset.i!=null?+t.dataset.i:null;

  switch(act){
    case "noop": return;
    case "tab": tab=t.dataset.tab; render(); window.scrollTo(0,0); return;
    case "toggleEdit":
      editing=!editing; document.body.classList.toggle("editing",editing); t.textContent=editing?"完成":"編輯"; render(); return;
    case "menu": openMenu(); return;

    case "toggle":{
      const row=plan.phases[p].months[m].rows[r]; row.done=!row.done; save();
      const el=t.closest(".row"); if(el) el.classList.toggle("done",row.done);
      t.setAttribute("aria-pressed", row.done?"true":"false"); updateCounters(); return;
    }
    case "editrow": editRow(p,m,r); return;
    case "delrow": if(confirm("刪除這個重點？")){ plan.phases[p].months[m].rows.splice(r,1); save(); render(); } return;
    case "addrow": addRow(p,m); return;
    case "editmonth": editMonth(p,m); return;
    case "addmonth": addMonth(p); return;
    case "editphase": editPhase(p); return;
    case "delphase": delPhase(p); return;
    case "addphase": addPhase(); return;
    case "editmeta": editMeta(); return;
    case "editexam": editExam(); return;
    case "editmetric": editMetric(i); return;
    case "addmetric": addMetric(); return;
    case "editnote": editNote(); return;
    case "editkit": editKit(p,i); return;
    case "addkit": addKit(p); return;
    case "editdaily": editDaily(i); return;
    case "deldaily": if(confirm("刪除這個每日項目？")){ plan.daily.items.splice(i,1); plan.dailyState=null; save(); render(); } return;
    case "adddaily": addDaily(); return;
    case "editsample": editSample(i); return;
    case "delsample": if(confirm("刪除這一天？")){ plan.sample.days.splice(i,1); save(); render(); } return;
    case "addsample": addSample(); return;

    case "dtoggle":{ ensureDailyToday(); plan.dailyState.done[i]=!plan.dailyState.done[i]; save(); render(); return; }

    case "wtoggle":{
      const task=plan.phases[p].months[m].weeks[w].tasks[tk]; task.done=!task.done; save();
      if(tab==="plan"){ const el=t.closest(".row"); if(el) el.classList.toggle("done",task.done); t.setAttribute("aria-pressed", task.done?"true":"false"); updateCounters(); }
      else render();
      return;
    }
    case "wtoggleopen":{ const key=p+"_"+m+"_"+w; const el=document.getElementById("wk"+key); const on=el.classList.toggle("open"); if(on) openWeeks.add(key); else openWeeks.delete(key); return; }
    case "gotoweek":{ const key=p+"_"+m+"_"+w; openWeeks.add(key); const el=document.getElementById("wk"+key); if(el){ el.classList.add("open"); el.scrollIntoView({behavior:"smooth",block:"center"}); } return; }
    case "weditrow": wEditRow(p,m,w,tk); return;
    case "wdelrow": if(confirm("刪除這個任務？")){ plan.phases[p].months[m].weeks[w].tasks.splice(tk,1); save(); render(); } return;
    case "waddrow": wAddRow(p,m,w); return;
    case "waddweek": wAddWeek(p,m); return;
    case "wdelweek": wDelWeek(p,m,w); return;
    case "wtogglerest":{ const wk=plan.phases[p].months[m].weeks[w]; wk.rest=!wk.rest; save(); render(); return; }
  }
});

/* ---------------- boot ---------------- */
load();
render();
</script>
</body>
</html>
