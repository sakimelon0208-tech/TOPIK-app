<style>
  :root{
    --paper:#F0F1EE; --card:#FBFBF9; --ink:#2B2E33; --muted:#6B6F76;
    --faint:#9A9EA3; --line:#E1E0DA;
    --p1:#7A8B6F; --p1-soft:#EAEEE5;
    --p2:#5E7A8C; --p2-soft:#E6ECEF;
    --p3:#A9697A; --p3-soft:#F1E7EA;
    --daily:#4A4E54;
    --num:"Space Grotesk", ui-monospace, sans-serif;
    --cjk:"PingFang TC","Microsoft JhengHei","Noto Sans TC","Hiragino Sans",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--cjk);line-height:1.65;letter-spacing:.01em;
    padding:0 18px calc(72px + env(safe-area-inset-bottom))}
  .wrap{max-width:680px;margin:0 auto}
  button{font-family:inherit}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--p2);outline-offset:2px;border-radius:6px}
  small{font-size:11.5px;color:var(--faint)}

  /* ---------- bar ---------- */
  .bar{position:sticky;top:0;z-index:40;margin:0 -18px;background:rgba(240,241,238,.86);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line)}
  .bar-in{max-width:680px;margin:0 auto;padding:10px 18px;padding-top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:10px}
  .bar-title{font-family:var(--num);font-size:12.5px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .bar-actions{display:flex;gap:8px}
  .btn{font-size:13.5px;font-weight:600;border:1px solid var(--p2);background:var(--p2);color:#fff;padding:7px 14px;border-radius:10px;cursor:pointer;line-height:1}
  .btn.ghost{background:transparent;color:var(--muted);border-color:var(--line)}
  .btn:active{transform:translateY(1px)}
  body.editing .btn.edit{background:var(--p3);border-color:var(--p3)}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin:16px 0 4px}
  .tab{flex:1;font-size:13.5px;font-weight:600;color:var(--muted);background:none;border:0;border-radius:9px;padding:9px 6px;cursor:pointer}
  .tab.on{background:var(--p2);color:#fff}

  /* ---------- header ---------- */
  header{padding-top:16px}
  .eyebrow{font-family:var(--num);font-size:13px;font-weight:500;letter-spacing:.14em;color:var(--p2);text-transform:uppercase}
  h1{font-size:29px;line-height:1.25;font-weight:700;margin:8px 0 10px}
  .lede{color:var(--muted);font-size:15px;max-width:44ch}
  .lede b{color:var(--ink);font-weight:600}
  .edchip{display:none;margin-top:12px;font-size:12.5px;font-weight:600;color:var(--p2);background:var(--p2-soft);border:0;border-radius:20px;padding:5px 12px;cursor:pointer}
  body.editing .edchip{display:inline-flex;align-items:center;gap:5px}

  /* ---------- countdown ---------- */
  .countdown{display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%;text-align:left;margin:22px 0 6px;
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--p3);border-radius:16px;padding:16px 18px;cursor:default}
  body.editing .countdown{cursor:pointer;border-style:dashed;border-left-style:solid}
  .cd-label{font-size:12.5px;color:var(--muted)}
  .cd-date{font-family:var(--num);font-size:14px;font-weight:600;color:var(--ink);margin-top:3px}
  .cd-num{font-family:var(--num);font-weight:700;font-size:38px;line-height:1;color:var(--p3);white-space:nowrap;text-align:right}
  .cd-num small{display:block;font-size:11px;color:var(--faint);font-weight:500;margin-top:4px}

  /* ---------- metrics ---------- */
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0 8px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 12px;text-align:left;cursor:default}
  body.editing .metric{cursor:pointer;border-style:dashed}
  .metric .k{font-size:11.5px;color:var(--faint);letter-spacing:.04em}
  .metric .v{font-family:var(--num);font-weight:600;font-size:21px;margin-top:4px;line-height:1.1;color:var(--ink)}
  .metric .v small{font-size:12px;color:var(--muted);font-weight:500}
  .metric.add{display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:22px;border-style:dashed}

  /* ---------- overall ---------- */
  .overall{margin:14px 0 4px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .ov-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--muted)}
  .ov-top b{font-family:var(--num);font-size:20px;font-weight:700;color:var(--ink)}
  .ov-track{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin:9px 0 6px}
  .ov-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--p1),var(--p2) 55%,var(--p3));transition:width .5s ease}
  .ov-sub{font-size:11.5px;color:var(--faint)}

  /* ---------- this-week card ---------- */
  .thisweek{margin:14px 0 4px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--p2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;justify-content:space-between}
  .tw-k{font-size:11.5px;color:var(--p2);font-weight:700;letter-spacing:.06em}
  .tw-title{font-family:var(--num);font-size:15px;font-weight:600;color:var(--ink);margin-top:2px}
  .tw-sub{font-size:11.5px;color:var(--faint);margin-top:3px}
  .tw-btn{flex:0 0 auto;font-size:12.5px;font-weight:600;color:#fff;background:var(--p2);border:0;border-radius:10px;padding:9px 13px;cursor:pointer}
  .thisweek.rest{border-left-color:var(--faint)} .thisweek.rest .tw-k{color:var(--muted)}

  /* ---------- phase ---------- */
  .phase{margin-top:30px}
  .phase-head{display:flex;align-items:flex-start;gap:14px;padding:16px 16px 15px;border-radius:16px 16px 4px 4px;color:#fff}
  .p1 .phase-head{background:var(--p1)} .p2 .phase-head{background:var(--p2)} .p3 .phase-head{background:var(--p3)}
  .phase-no{font-family:var(--num);font-weight:700;font-size:26px;line-height:1;opacity:.85;padding-top:2px}
  .phase-headmain{flex:1;min-width:0}
  .phase-title{font-size:19px;font-weight:700;letter-spacing:.02em}
  .phase-when{font-family:var(--num);font-size:12.5px;font-weight:500;opacity:.9;letter-spacing:.03em;margin-top:1px}
  .phase-prog{flex:0 0 auto;text-align:right;padding-top:3px}
  .phase-prog span{font-family:var(--num);font-size:13px;font-weight:600;opacity:.95}
  .ptrack{height:4px;width:64px;background:rgba(255,255,255,.28);border-radius:3px;overflow:hidden;margin-top:5px}
  .pfill{height:100%;background:#fff;border-radius:3px;transition:width .5s ease}
  .phase-goal{font-size:13.5px;padding:11px 16px;color:var(--ink);border-left:3px solid}
  .p1 .phase-goal{background:var(--p1-soft);border-color:var(--p1)}
  .p2 .phase-goal{background:var(--p2-soft);border-color:var(--p2)}
  .p3 .phase-goal{background:var(--p3-soft);border-color:var(--p3)}
  .phase-goal b{font-weight:600}
  .headctl{display:none;gap:6px;margin-top:8px;flex-wrap:wrap}
  body.editing .headctl{display:flex}
  .hbtn{font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:0;border-radius:8px;padding:5px 10px;cursor:pointer}

  .kit-edit{padding:10px 16px 4px}
  .kit-item{display:block;width:100%;text-align:left;font-size:12.5px;color:var(--ink);background:var(--card);border:1px dashed var(--line);border-radius:8px;padding:7px 10px;margin-bottom:5px;cursor:pointer}
  .kit-item b{font-weight:600}

  /* ---------- months ---------- */
  .months{position:relative;padding:6px 0 2px 0}
  .month{position:relative;display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .month:last-child{border-bottom:none}
  .spine{position:relative;flex:0 0 46px;text-align:center}
  .spine .dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--card);margin:6px auto 0}
  .p1 .spine .dot{background:var(--p1)} .p2 .spine .dot{background:var(--p2)} .p3 .spine .dot{background:var(--p3)}
  .month:not(:last-child) .spine::after{content:"";position:absolute;top:20px;bottom:-14px;left:50%;width:2px;margin-left:-1px;background:var(--line)}
  .mlabel{font-family:var(--num);font-weight:600;font-size:15px;margin-top:2px;color:var(--ink)}
  .mlabel small{display:block;font-size:10px;color:var(--faint);font-weight:500}
  .mdone{font-family:var(--num);font-size:10.5px;font-weight:600;color:var(--muted);margin-top:7px}
  .medit{display:none;margin-top:6px;font-size:11px;color:var(--p2);background:none;border:0;cursor:pointer}
  body.editing .medit{display:inline-block}
  .mbody{flex:1;min-width:0}
  .cap-lbl{font-size:10.5px;color:var(--faint);letter-spacing:.08em;margin:12px 0 5px;font-weight:700;text-transform:uppercase;font-family:var(--num)}

  .row{display:flex;gap:8px;font-size:13.5px;margin-bottom:5px;align-items:flex-start}
  .row .tag{flex:0 0 42px;font-size:11px;color:var(--faint);letter-spacing:.02em;padding-top:2px}
  .row .txt{flex:1;color:var(--ink)}
  .row .txt b{font-weight:600}
  .row .txt small{margin-left:2px}
  .row.done .txt{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--faint)}
  .row.done .txt b{color:var(--faint)}
  .row.done .flag{opacity:.5}
  .row.rowflag{align-items:center}

  .ck{position:relative;flex:0 0 18px;width:18px;height:18px;margin-top:1px;padding:0;border:1.6px solid var(--line);border-radius:6px;background:var(--card);cursor:pointer}
  .ck[aria-pressed="true"]{border-color:transparent}
  .ck.p1[aria-pressed="true"]{background:var(--p1)}
  .ck.p2[aria-pressed="true"]{background:var(--p2)}
  .ck.p3[aria-pressed="true"]{background:var(--p3)}
  .ck[aria-pressed="true"]::after{content:"";position:absolute;left:5px;top:1.5px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}

  .ctls{display:none;gap:2px;margin-left:auto}
  body.editing .ctls{display:inline-flex}
  .ctl{font-size:12px;color:var(--faint);background:none;border:0;cursor:pointer;padding:2px 5px;line-height:1}
  .ctl.del{color:var(--p3)}
  .addrow{display:none;margin-top:4px;font-size:12px;font-weight:600;color:var(--p2);background:var(--p2-soft);border:0;border-radius:8px;padding:5px 11px;cursor:pointer}
  body.editing .addrow{display:inline-block}

  .weeks{margin-top:2px}
  .week{border:1px solid var(--line);border-radius:10px;margin-bottom:6px;overflow:hidden;background:var(--paper)}
  .week.cur{border-color:var(--p2);box-shadow:inset 0 0 0 1px var(--p2)}
  .wk-head{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:0;cursor:pointer;padding:9px 11px}
  .wk-name{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--ink)}
  .wk-name small{font-family:var(--num);font-weight:500;color:var(--faint);font-size:11px;margin-left:5px}
  .wk-name em{font-style:normal;font-size:10px;font-weight:700;color:var(--p2);background:var(--p2-soft);border-radius:20px;padding:1px 7px;margin-left:6px;vertical-align:1px}
  .wk-count{font-family:var(--num);font-size:11.5px;font-weight:600;color:var(--muted)}
  .wk-caret{color:var(--faint);font-size:10px;transition:transform .2s ease}
  .week.open .wk-caret{transform:rotate(180deg)}
  .wk-body{display:none;padding:1px 11px 10px 11px;border-top:1px solid var(--line)}
  .week.open .wk-body{display:block}
  .wrow{margin-top:8px} .wrow .txt{font-size:13px}
  .wk-tools{display:none;gap:8px;margin-top:9px;flex-wrap:wrap}
  body.editing .wk-tools{display:flex}
  .wk-tool{font-size:12px;font-weight:600;color:var(--p2);background:var(--p2-soft);border:0;border-radius:8px;padding:5px 10px;cursor:pointer}
  .wk-tool.del{color:var(--p3);background:var(--p3-soft)}
  .addweek{display:none;width:100%;margin-top:2px;font-size:12.5px;font-weight:600;color:var(--p2);background:var(--card);border:1px dashed var(--p2);border-radius:10px;padding:9px;cursor:pointer}
  body.editing .addweek{display:block}
  .week.rest{background:repeating-linear-gradient(45deg,var(--paper),var(--paper) 7px,#EAE8E2 7px,#EAE8E2 14px);border-style:dashed}
  .week.rest .wk-name{color:var(--muted)}
  .rest-badge{font-style:normal;font-size:10px;font-weight:700;color:var(--faint)!important;background:var(--line)!important;border-radius:20px;padding:1px 7px;margin-left:6px;vertical-align:1px}
  .rest-msg{font-size:12.5px;color:var(--muted);padding:8px 0 2px}

  .vbar{margin-top:8px}
  .vbar .cap{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-bottom:3px}
  .vbar .cap b{font-family:var(--num);color:var(--ink);font-weight:600}
  .track{height:5px;background:var(--line);border-radius:3px;overflow:hidden}
  .fill{height:100%;border-radius:3px}
  .p1 .fill{background:var(--p1)} .p2 .fill{background:var(--p2)} .p3 .fill{background:var(--p3)}

  .flag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
  .flag.reg{background:var(--p2-soft);color:var(--p2)}
  .flag.exam{background:var(--p3-soft);color:var(--p3)}

  .addblk{display:none;margin-top:14px}
  body.editing .addblk{display:block}
  .addbig{width:100%;font-size:13.5px;font-weight:600;color:var(--p2);background:var(--card);border:1px dashed var(--p2);border-radius:14px;padding:13px;cursor:pointer}
  .addmonth{margin:2px 0 0 60px}

  .note{margin-top:24px;font-size:13px;color:var(--muted);background:var(--p1-soft);border-radius:14px;padding:15px 16px;border-left:3px solid var(--p1);width:100%;text-align:left;cursor:default}
  body.editing .note{cursor:pointer;border:1px dashed var(--p1);border-left:3px solid var(--p1)}
  .note b{color:var(--ink);font-weight:600}
  .foot{margin-top:22px;text-align:center;font-size:11px;color:var(--faint);font-family:var(--num);letter-spacing:.06em}

  /* ---------- exec view ---------- */
  .exec-cd{display:flex;align-items:baseline;gap:10px;margin:18px 0 2px}
  .exec-cd b{font-family:var(--num);font-size:24px;font-weight:700;color:var(--p3)}
  .exec-cd span{font-size:12.5px;color:var(--muted)}

  .daily{background:var(--daily);color:#fff;border-radius:16px;padding:18px 18px 15px;margin-top:16px}
  .daily-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:3px}
  .daily .badge{font-family:var(--num);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.22);color:#fff}
  .daily-cnt{font-family:var(--num);font-size:12px;font-weight:600;color:rgba(255,255,255,.8)}
  .daily h2{color:#fff;font-size:17px;font-weight:700;margin-top:8px}
  .daily-sub{font-size:12.5px;color:rgba(255,255,255,.8);margin:3px 0 10px}
  .drow{display:flex;gap:11px;align-items:flex-start;padding:8px 0;border-top:1px solid rgba(255,255,255,.15)}
  .drow:first-of-type{border-top:none}
  .drow .dtxt{flex:1;font-size:13.5px;color:#fff}
  .drow .dtxt b{font-weight:600}
  .drow .dtxt small{color:rgba(255,255,255,.62)}
  .drow.done .dtxt{color:rgba(255,255,255,.5);text-decoration:line-through}
  .drow.done .dtxt b{color:rgba(255,255,255,.5)}
  .dck{position:relative;flex:0 0 18px;width:18px;height:18px;margin-top:1px;padding:0;border:1.6px solid rgba(255,255,255,.55);border-radius:6px;background:transparent;cursor:pointer}
  .dck[aria-pressed="true"]{background:#fff;border-color:#fff}
  .dck[aria-pressed="true"]::after{content:"";position:absolute;left:5px;top:1.5px;width:5px;height:9px;border:solid var(--daily);border-width:0 2px 2px 0;transform:rotate(45deg)}
  .daily-hint{font-size:11px;color:rgba(255,255,255,.55);margin-top:10px}
  .daily .ctl{color:rgba(255,255,255,.7)} .daily .ctl.del{color:#E7B4C0}
  .daddrow{display:none;margin-top:10px;font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:0;border-radius:8px;padding:6px 11px;cursor:pointer}
  body.editing .daddrow{display:inline-block}

  .sect{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 16px 14px;margin-top:16px}
  .sect-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .sect h2{font-size:16px;font-weight:700}
  .sect .badge{font-family:var(--num);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;color:#fff}
  .b1{background:var(--p1)} .b2{background:var(--p2)} .b3{background:var(--p3)}
  .sect .sub{font-size:12.5px;color:var(--muted);margin:6px 0 10px}
  .refnote{font-size:11.5px;color:var(--faint);margin-top:2px}

  .sday{display:flex;gap:12px;padding:8px 0;border-top:1px dashed var(--line);align-items:baseline}
  .sday:first-of-type{border-top:none}
  .sday .d{flex:0 0 34px;font-family:var(--num);font-weight:600;font-size:13px;color:var(--p2)}
  .sday .d.wknd{color:var(--p3)}
  .sday .x{flex:1;font-size:13px}
  .sday .x small{margin-left:2px}

  /* ---------- sheet ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(43,46,51,.4);z-index:60;display:flex;align-items:flex-end;justify-content:center}
  .sheet{width:100%;max-width:520px;background:var(--paper);border-radius:20px 20px 0 0;padding:18px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.16)}
  .sheet h3{font-size:16px;font-weight:700;margin-bottom:14px}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  .fld label .hint{font-weight:400;color:var(--faint)}
  .fld input,.fld textarea,.fld select{width:100%;font-family:var(--cjk);font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
  .fld textarea{min-height:74px;resize:vertical;line-height:1.6}
  .fld input[type=date]{font-family:var(--num)}
  .sheet-actions{display:flex;gap:10px;margin-top:6px}
  .sheet-actions .btn{flex:1;text-align:center;padding:12px}
  .btn.sec{background:var(--card);color:var(--muted);border-color:var(--line)}
  .btn.danger{flex:0 0 auto;background:var(--p3-soft);color:var(--p3);border-color:transparent}

  @media (max-width:420px){
    h1{font-size:25px}
    .metrics{gap:8px} .metric .v{font-size:18px}
    .cd-num{font-size:33px}
    .spine{flex-basis:38px} .row .tag{flex-basis:38px}
    .addmonth{margin-left:52px}
  }
  @media (prefers-reduced-motion:reduce){.fill,.ov-fill,.pfill{transition:none}}
</style>
</head>

/* ---------------- state ---------------- */
const KEY="topik2_plan_v1";
let plan, editing=false, tab="exec";
const openWeeks=new Set();
let seededOpen=false;

/* ---------------- persistence ---------------- */
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(plan)); }catch(e){} }
function guessYear(mo){ const n=parseInt(mo.num,10); return (n>=7)?2026:2027; }
function weekFromKit(kit){ return {tasks:(kit||[]).map(k=>({txt:k.txt, small:k.small||"", done:false}))}; }
function makeWeeks(n, kit){ const a=[]; for(let i=0;i<n;i++) a.push(weekFromKit(kit)); return a; }
function todayStr(){ const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0"); }

function load(){
  let raw=null;
  try{ raw=localStorage.getItem(KEY); }catch(e){}
  if(raw){ try{ plan=JSON.parse(raw); }catch(e){ plan=clone(DEFAULT); } }
  else { plan=clone(DEFAULT); }
  ensureShape();
  save();
}
function ensureDailyToday(){
  const t=todayStr(), n=(plan.daily.items||[]).length;
  if(!plan.dailyState || plan.dailyState.date!==t || !Array.isArray(plan.dailyState.done) || plan.dailyState.done.length!==n){
    plan.dailyState={date:t, done:new Array(n).fill(false)};
  }
}
function ensureShape(){
  plan.meta=plan.meta||clone(DEFAULT.meta);
  plan.metrics=plan.metrics||[];
  plan.phases=plan.phases||[];
  plan.daily=plan.daily||clone(DEFAULT.daily);
  plan.sample=plan.sample||clone(DEFAULT.sample);
  if(!("note" in plan)) plan.note=DEFAULT.note;

  plan.phases.forEach((ph,pi)=>{
    if(!Array.isArray(ph.kit)) ph.kit = DEFAULT.phases[pi] ? clone(DEFAULT.phases[pi].kit) : [];
    const kit=ph.kit;
    (ph.months||[]).forEach(mo=>{
      (mo.rows||[]).forEach(r=>{ if(typeof r.done!=="boolean") r.done=false; });
      if(mo.year==null) mo.year=guessYear(mo);
      if(!Array.isArray(mo.weeks)) mo.weeks=makeWeeks(4, kit);
      else mo.weeks.forEach(w=>{ w.tasks=w.tasks||[]; w.tasks.forEach(t=>{ if(typeof t.done!=="boolean") t.done=false; if(t.small==null) t.small=""; }); });
    });
  });

  // one-time: weekly tasks follow each phase's kit (weekly operating sheet)
  if(!plan.meta.kitApplied_v1){
    plan.phases.forEach(ph=>{ const kit=ph.kit||[]; (ph.months||[]).forEach(mo=>{ (mo.weeks||[]).forEach(w=>{ w.tasks=kit.map(k=>({txt:k.txt, small:k.small||"", done:false})); }); }); });
    plan.meta.kitApplied_v1=true;
  }
  // one-time: mark unavailable weeks as rest
  if(!plan.meta.restApplied_v1){
    const BLOCKED=[["2026-08-11","2026-08-19"],["2026-09-19","2026-09-26"],["2026-10-07","2026-10-13"],["2026-10-28","2026-11-02"],["2026-12-25","2027-01-03"]];
    const toDate=s=>{ const p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); };
    const ranges=BLOCKED.map(b=>[toDate(b[0]),toDate(b[1])]);
    plan.phases.forEach(ph=>(ph.months||[]).forEach(mo=>{
      const W=(mo.weeks||[]).length;
      (mo.weeks||[]).forEach((w,wi)=>{
        const meta=weekMeta(mo,wi,W); if(!meta.start) return;
        const ws=new Date(meta.y,meta.mn-1,meta.start).getTime(), we=new Date(meta.y,meta.mn-1,meta.end).getTime();
        const len=meta.end-meta.start+1; let ov=0;
        ranges.forEach(([rs,re])=>{ const s=Math.max(ws,rs.getTime()), e=Math.min(we,re.getTime()); if(e>=s) ov=Math.max(ov,Math.round((e-s)/86400000)+1); });
        if(len>0 && ov/len>=0.5) w.rest=true;
      });
    }));
    plan.meta.restApplied_v1=true;
  }

  // one-time: text updates applied to existing saved data
  if(!plan.meta.textUpdate_v2){
    if(plan.meta.title==="9 個月讀書計畫") plan.meta.title="TOPIK讀書計劃";
    plan.meta.lede="目標：總分 150+／300";
    if(plan.sample){ plan.sample.title="一週節奏（以銜接期為例）"; plan.sample.note="每天都先跑「例行三件」,再疊上當天的每週目標項目。"; }
    const strip=s=>{
      if(typeof s!=="string") return s;
      let out=s.replace(/[、,，]?最該找人批改/g,"").replace(/[,，]?\s*\*{0,2}找人批改\*{0,2}（[^）]*）/g,"").replace(/[,，]?\s*找人批改/g,"");
      if(out!==s) out=out.replace(/[,，]\s*$/,"").trim();
      return out;
    };
    plan.phases.forEach(ph=>{
      ph.goal=strip(ph.goal);
      (ph.kit||[]).forEach(k=>{ const had=k.small&&k.small.indexOf("找人批改")>=0; k.txt=strip(k.txt); k.small=strip(k.small); if(had&&!k.small) k.txt=k.txt.replace(/[,，]\s*$/,""); });
      (ph.months||[]).forEach(mo=>{
        (mo.rows||[]).forEach(r=>{ r.txt=strip(r.txt); });
        (mo.weeks||[]).forEach(w=>{ (w.tasks||[]).forEach(t=>{ const had=t.small&&t.small.indexOf("找人批改")>=0; t.txt=strip(t.txt); t.small=strip(t.small); if(had&&!t.small) t.txt=t.txt.replace(/[,，]\s*$/,""); }); });
      });
    });
    (plan.daily.items||[]).forEach(it=>{ if(it.small && /App/i.test(it.small)) it.small="紙本單字書:遮起來回想再對答案,別只看過"; });
    plan.meta.textUpdate_v2=true;
  }
  ensureDailyToday();
}

/* ---------------- helpers ---------------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmt(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>"); }
function smallHTML(s){ return s?` <small>${esc(s)}</small>`:""; }

function daysUntil(d){
  if(!d) return null;
  const p=d.split("-").map(Number);
  const exam=new Date(p[0], p[1]-1, p[2]);
  const now=new Date(); const today=new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((exam-today)/86400000);
}
function dateLabel(d){
  if(!d) return "";
  const p=d.split("-").map(Number);
  const dt=new Date(p[0], p[1]-1, p[2]);
  const wd="日一二三四五六"[dt.getDay()];
  return `${p[0]} / ${String(p[1]).padStart(2,"0")} / ${String(p[2]).padStart(2,"0")}（${wd}）`;
}
function countdown(){
  const dU=daysUntil(plan.meta.examDate);
  if(dU===null) return {num:"—", small:""};
  if(dU>0) return {num:"D-"+dU, small:"還有 "+dU+" 天"};
  if(dU===0) return {num:"D-DAY", small:"就是今天"};
  return {num:"考完囉", small:"+"+(-dU)+" 天"};
}
function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
function weekMeta(mo, wi, W){
  const y=mo.year, mn=parseInt(mo.num,10);
  if(!y||!mn) return {label:`第${wi+1}週`, dates:"", current:false};
  const last=daysInMonth(y,mn);
  let start=wi*7+1;
  if(start>last) return {label:`第${wi+1}週`, dates:"", current:false};
  const end=(wi===W-1)?last:Math.min(start+6,last);
  const now=new Date();
  const current=(now.getFullYear()===y && (now.getMonth()+1)===mn && now.getDate()>=start && now.getDate()<=end);
  return {label:`第${wi+1}週`, dates:`${mn}/${start}–${mn}/${end}`, current, y, mn, start, end};
}
function findCurrentWeek(){
  for(let pi=0; pi<plan.phases.length; pi++){
    const ms=plan.phases[pi].months||[];
    for(let mi=0; mi<ms.length; mi++){
      const ws=ms[mi].weeks||[];
      for(let wi=0; wi<ws.length; wi++){
        if(weekMeta(ms[mi],wi,ws.length).current) return {pi,mi,wi,meta:weekMeta(ms[mi],wi,ws.length),mo:ms[mi]};
      }
    }
  }
  return null;
}
function phaseByToday(){
  const now=new Date(), y=now.getFullYear(), mn=now.getMonth()+1;
  for(let pi=0;pi<plan.phases.length;pi++){ for(const mo of (plan.phases[pi].months||[])){ if(mo.year===y && parseInt(mo.num,10)===mn) return pi; } }
  return 0;
}
function computeStats(){
  let od=0, ot=0, restCount=0; const phases=[], months={}, weeks={};
  plan.phases.forEach((ph,pi)=>{
    let pd=0, pt=0;
    (ph.months||[]).forEach((mo,mi)=>{
      let md=0, mt=0;
      (mo.rows||[]).forEach(r=>{ mt++; if(r.done) md++; });
      (mo.weeks||[]).forEach((w,wi)=>{
        if(w.rest){ weeks[pi+"_"+mi+"_"+wi]={done:0,total:0,rest:true}; restCount++; return; }
        let wd=0, wt=0;
        (w.tasks||[]).forEach(t=>{ wt++; if(t.done) wd++; });
        weeks[pi+"_"+mi+"_"+wi]={done:wd,total:wt};
        md+=wd; mt+=wt;
      });
      months[pi+"_"+mi]={done:md,total:mt};
      pd+=md; pt+=mt;
    });
    phases.push({done:pd,total:pt,pct:pt?Math.round(pd/pt*100):0});
    od+=pd; ot+=pt;
  });
  return {overall:{done:od,total:ot,pct:ot?Math.round(od/ot*100):0}, phases, months, weeks, restCount};
}

  const done=t.done?" done":"";

  return `<div class="row wrow${done}">${ck}<span class="txt">${fmt(t.txt)}${smallHTML(t.small)}</span>${ctls}</div>`;

function render(){
  ensureDailyToday();
  const st=computeStats();
  const cur=findCurrentWeek();
  if(cur && !seededOpen){ openWeeks.add(cur.pi+"_"+cur.mi+"_"+cur.wi); seededOpen=true; }

  let h=`<div class="tabs">

    <button class="tab ${tab==="plan"?"on":""}" data-act="tab" data-tab="plan">總覽</button>
  </div>`;

  h += (tab==="plan") ? planView(st,cur) : execView(st,cur);
  app.innerHTML=h;
}

  }
  const curWk=plan.phases[cur.pi].months[cur.mi].weeks[cur.wi];

    return `<div class="thisweek rest"><div><div class="tw-k">本週</div>

    <div class="tw-title">${esc(cur.mo.num)}月 ${esc(cur.meta.label)}　<span style="color:var(--faint);font-weight:500">${esc(cur.meta.dates)}</span></div>
    <div class="tw-sub">本週目標已完成 ${wc.done} / ${wc.total}</div></div>${jump}</div>`;

function execView(st,cur){
  const cd=countdown();
  const pi = cur ? cur.pi : phaseByToday();
  const ph = plan.phases[pi] || plan.phases[0];
  const badgeCls = ph.color==="p1"?"b1":ph.color==="p2"?"b2":"b3";
  const dstate = plan.dailyState.done;
  const dDone = dstate.filter(Boolean).length, dTot = plan.daily.items.length;
  let h="";

  h+=`<div class="exec-cd"><b>${esc(cd.num)}</b><span>距 ${esc(plan.meta.examLabel)} · 現在是「${esc(ph.title)}」</span></div>`;

  /* daily */
  h+=`<div class="daily">
    <div class="daily-head"><span class="badge">每日 · DAILY</span><span class="daily-cnt">今天 ${dDone}/${dTot}</span></div>
    <h2>${esc(plan.daily.title)}</h2>
    <div class="daily-sub">${esc(plan.daily.sub)}</div>`;
  plan.daily.items.forEach((it,i)=>{
    const done=dstate[i]?" done":"";
    const ck=`<button class="dck" data-act="dtoggle" data-i="${i}" aria-pressed="${dstate[i]?"true":"false"}" aria-label="標記完成"></button>`;
    const ctls=`<span class="ctls"><button class="ctl" data-act="editdaily" data-i="${i}">✎</button><button class="ctl del" data-act="deldaily" data-i="${i}">✕</button></span>`;
    h+=`<div class="drow${done}">${ck}<span class="dtxt">${fmt(it.txt)}${smallHTML(it.small)}</span>${ctls}</div>`;
  });
  h+=`<button class="daddrow" data-act="adddaily">＋ 每日項目</button>`;
  h+=`<div class="daily-hint">每天自動重置;今天的勾選會保存,跨日就清空。</div></div>`;

  /* this week's kit */
  h+=`<div class="sect">
    <div class="sect-head"><h2>本週目標</h2><span class="badge ${badgeCls}">${esc(ph.title)}</span></div>`;
  if(cur && !plan.phases[cur.pi].months[cur.mi].weeks[cur.wi].rest){
    const wk=plan.phases[cur.pi].months[cur.mi].weeks[cur.wi];
    const wc=st.weeks[cur.pi+"_"+cur.mi+"_"+cur.wi];
    h+=`<div class="sub">${esc(cur.mo.num)}月 ${esc(cur.meta.label)} · ${esc(cur.meta.dates)} —— 本週要湊齊 <b style="color:var(--ink)">${wc.done}/${wc.total}</b></div>`;
    (wk.tasks||[]).forEach((t,ti)=>{ h+=taskRowHTML(t,cur.pi,cur.mi,cur.wi,ti,esc(ph.color)); });
    h+=`<button class="addrow" data-act="waddrow" data-p="${cur.pi}" data-m="${cur.mi}" data-w="${cur.wi}">＋ 任務</button>`;
  } else if(cur){
    h+=`<div class="sub">本週是休息週,無法讀書。以下是「${esc(ph.title)}」每週目標參考:</div>`;
    (ph.kit||[]).forEach(k=>{ h+=`<div class="row"><span class="txt">${fmt(k.txt)}${smallHTML(k.small)}</span></div>`; });
  } else {
    h+=`<div class="sub">今天不在計畫週次;以下是「${esc(ph.title)}」每週目標參考:</div>`;
    (ph.kit||[]).forEach(k=>{ h+=`<div class="row"><span class="txt">${fmt(k.txt)}${smallHTML(k.small)}</span></div>`; });
    h+=`<div class="refnote">到了計畫期間,這裡會變成當週可打勾的清單。</div>`;
  }
  h+=`</div>`;

  /* sample week */
  h+=`<div class="sect">
    <div class="sect-head"><h2>${esc(plan.sample.title)}</h2></div>
    <div class="sub">${esc(plan.sample.note)}</div>`;
  (plan.sample.days||[]).forEach((d,i)=>{
    const ctls=editing?`<span class="ctls"><button class="ctl" data-act="editsample" data-i="${i}">✎</button><button class="ctl del" data-act="delsample" data-i="${i}">✕</button></span>`:"";
    h+=`<div class="sday"><span class="d${d.wknd?" wknd":""}">${esc(d.d)}</span><span class="x">${fmt(d.x)}${smallHTML(d.small)}</span>${ctls}</div>`;
  });
  h+=`<button class="addrow" data-act="addsample" style="margin-top:8px">＋ 新增一天</button>`;
  h+=`</div>`;

  h+=`<div class="foot">MIKA · KOREAN · WEEKLY OPERATING SHEET</div>`;
  return h;
}

/* ---------------- live counters (plan tab only) ---------------- */
function updateCounters(){
  const st=computeStats();
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  const fw=(id,pct)=>{ const el=document.getElementById(id); if(el) el.style.width=pct+"%"; };
  fw("ovFill",st.overall.pct); set("ovPct",st.overall.pct+"%");
  const ov=document.getElementById("ovSub"); if(ov) ov.textContent=`已完成 ${st.overall.done} / ${st.overall.total} 個任務${st.restCount?`　·　已扣除 ${st.restCount} 個休息週`:""}`;
  st.phases.forEach((ps,pi)=>{ fw("pf"+pi,ps.pct); set("pn"+pi,`${ps.done}/${ps.total}`); });
  Object.keys(st.months).forEach(k=>{ set("md"+k,`${st.months[k].done}/${st.months[k].total}`); });
  Object.keys(st.weeks).forEach(k=>{ set("wc"+k,`${st.weeks[k].done}/${st.weeks[k].total}`); });
}

/* ---------------- sheet ---------------- */
function openSheet(cfg){
  const bd=document.createElement("div");
  bd.className="backdrop";
  let inner=`<div class="sheet"><h3>${esc(cfg.title)}</h3>`;
  cfg.fields.forEach(f=>{
    const hint=f.hint?` <span class="hint">${esc(f.hint)}</span>`:"";
    let ctrl;
    if(f.type==="textarea") ctrl=`<textarea data-k="${f.key}" placeholder="${esc(f.placeholder||"")}">${esc(f.value||"")}</textarea>`;
    else if(f.type==="select") ctrl=`<select data-k="${f.key}">`+f.options.map(o=>`<option value="${esc(o.value)}"${o.value===f.value?" selected":""}>${esc(o.label)}</option>`).join("")+`</select>`;
    else ctrl=`<input type="${f.type||"text"}" data-k="${f.key}" value="${esc(f.value||"")}" placeholder="${esc(f.placeholder||"")}">`;
    inner+=`<div class="fld"><label>${esc(f.label)}${hint}</label>${ctrl}</div>`;
  });
  inner+=`<div class="sheet-actions">`;
  if(cfg.onDelete) inner+=`<button class="btn danger" data-s="del">刪除</button>`;
  inner+=`<button class="btn sec" data-s="cancel">取消</button><button class="btn" data-s="save">${esc(cfg.saveLabel||"儲存")}</button></div></div>`;
  bd.innerHTML=inner;
  document.body.appendChild(bd);
  const sheet=bd.querySelector(".sheet");
  const first=sheet.querySelector("input,textarea,select"); if(first) setTimeout(()=>first.focus(),50);
  const values=()=>{ const v={}; sheet.querySelectorAll("[data-k]").forEach(el=>v[el.getAttribute("data-k")]=el.value); return v; };
  bd.addEventListener("click", e=>{
    if(e.target===bd){ bd.remove(); return; }
    const b=e.target.closest("[data-s]"); if(!b) return;
    const s=b.getAttribute("data-s");
    if(s==="cancel") bd.remove();
    else if(s==="save"){ cfg.onSave(values()); bd.remove(); render(); }
    else if(s==="del"){ if(confirm("確定刪除？")){ cfg.onDelete(); bd.remove(); render(); } }
  });
}

    <div class="fld"><button class="addbig" data-s="export" style="border-style:solid">⬇️ 匯出進度（備份 JSON）</button></div>
    <div class="fld"><button class="addbig" data-s="import" style="border-style:solid">⬆️ 匯入進度（讀取 JSON）</button></div>
    <div class="fld"><button class="addbig" data-s="reset" style="border-color:var(--p3);color:var(--p3)">↺ 重設為預設計畫</button></div>
    <div class="sheet-actions"><button class="btn sec" data-s="cancel">關閉</button></div>
    <p style="font-size:11.5px;color:var(--faint);margin-top:12px;line-height:1.6">進度存在這支手機的瀏覽器裡。換裝置或清快取前,記得先匯出備份。</p></div>`;
  document.body.appendChild(bd);
  bd.addEventListener("click",e=>{
    if(e.target===bd){bd.remove();return;}
    const b=e.target.closest("[data-s]"); if(!b)return; const s=b.getAttribute("data-s");
    if(s==="cancel") bd.remove();
    else if(s==="export"){ exportJSON(); bd.remove(); }
    else if(s==="import"){ bd.remove(); document.getElementById("importer").click(); }
    else if(s==="reset"){ if(confirm("重設會清掉你的所有勾選與編輯,回到原本的計畫。確定？")){ plan=clone(DEFAULT); ensureShape(); save(); render(); bd.remove(); } }
  });
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(plan,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="topik2-plan-進度.json"; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
document.getElementById("importer").addEventListener("change",e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{ try{ const data=JSON.parse(reader.result); if(!data||!Array.isArray(data.phases)) throw 0; plan=data; ensureShape(); save(); render(); alert("已匯入。"); }catch(err){ alert("這個檔案看起來不是有效的計畫備份。"); } e.target.value=""; };
  reader.readAsText(file);
});

/* ---------------- events ---------------- */
document.addEventListener("click", e=>{
  const t=e.target.closest("[data-act]"); if(!t) return;
  const act=t.getAttribute("data-act");
  const p=t.dataset.p!=null?+t.dataset.p:null, m=t.dataset.m!=null?+t.dataset.m:null;
  const r=t.dataset.r!=null?+t.dataset.r:null, w=t.dataset.w!=null?+t.dataset.w:null;
  const tk=t.dataset.t!=null?+t.dataset.t:null, i=t.dataset.i!=null?+t.dataset.i:null;

  switch(act){
    case "noop": return;
    case "tab": tab=t.dataset.tab; render(); window.scrollTo(0,0); return;
    case "toggleEdit":
      editing=!editing; document.body.classList.toggle("editing",editing); t.textContent=editing?"完成":"編輯"; render(); return;
    case "menu": openMenu(); return;

    case "toggle":{
      const row=plan.phases[p].months[m].rows[r]; row.done=!row.done; save();
      const el=t.closest(".row"); if(el) el.classList.toggle("done",row.done);
      t.setAttribute("aria-pressed", row.done?"true":"false"); updateCounters(); return;
    }
    case "editrow": editRow(p,m,r); return;
    case "delrow": if(confirm("刪除這個重點？")){ plan.phases[p].months[m].rows.splice(r,1); save(); render(); } return;
    case "addrow": addRow(p,m); return;
    case "editmonth": editMonth(p,m); return;
    case "addmonth": addMonth(p); return;
    case "editphase": editPhase(p); return;
    case "delphase": delPhase(p); return;
    case "addphase": addPhase(); return;
    case "editmeta": editMeta(); return;
    case "editexam": editExam(); return;
    case "editmetric": editMetric(i); return;
    case "addmetric": addMetric(); return;
    case "editnote": editNote(); return;
    case "editkit": editKit(p,i); return;
    case "addkit": addKit(p); return;
    case "editdaily": editDaily(i); return;
    case "deldaily": if(confirm("刪除這個每日項目？")){ plan.daily.items.splice(i,1); plan.dailyState=null; save(); render(); } return;
    case "adddaily": addDaily(); return;
    case "editsample": editSample(i); return;
    case "delsample": if(confirm("刪除這一天？")){ plan.sample.days.splice(i,1); save(); render(); } return;
    case "addsample": addSample(); return;

    case "dtoggle":{ ensureDailyToday(); plan.dailyState.done[i]=!plan.dailyState.done[i]; save(); render(); return; }

    case "wtoggle":{
      const task=plan.phases[p].months[m].weeks[w].tasks[tk]; task.done=!task.done; save();
      if(tab==="plan"){ const el=t.closest(".row"); if(el) el.classList.toggle("done",task.done); t.setAttribute("aria-pressed", task.done?"true":"false"); updateCounters(); }
      else render();
      return;
    }
    case "wtoggleopen":{ const key=p+"_"+m+"_"+w; const el=document.getElementById("wk"+key); const on=el.classList.toggle("open"); if(on) openWeeks.add(key); else openWeeks.delete(key); return; }
    case "gotoweek":{ const key=p+"_"+m+"_"+w; openWeeks.add(key); const el=document.getElementById("wk"+key); if(el){ el.classList.add("open"); el.scrollIntoView({behavior:"smooth",block:"center"}); } return; }
    case "weditrow": wEditRow(p,m,w,tk); return;
    case "wdelrow": if(confirm("刪除這個任務？")){ plan.phases[p].months[m].weeks[w].tasks.splice(tk,1); save(); render(); } return;
    case "waddrow": wAddRow(p,m,w); return;
    case "waddweek": wAddWeek(p,m); return;
    case "wdelweek": wDelWeek(p,m,w); return;
    case "wtogglerest":{ const wk=plan.phases[p].months[m].weeks[w]; wk.rest=!wk.rest; save(); render(); return; }
  }
});

/* ---------------- boot ---------------- */
load();
render();
</script>
</body>
</html>
